services:
  backend:
    build:
      context: .
      dockerfile: deploy/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./vector_db:/app/vector_db

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    ports:
      - "3000:8501"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend

  monitoring:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    ports:
      - "8501:8502"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
