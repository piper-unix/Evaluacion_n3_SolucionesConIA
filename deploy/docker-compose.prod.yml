services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ../logs:/app/logs
      - ../vector_db:/app/vector_db
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    networks:
      - interna

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: "http://backend:8000"
    expose:
      - "8501"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - interna

  monitoring:
    build:
      context: ..
      dockerfile: monitoring/Dockerfile
    restart: unless-stopped
    expose:
      - "8502"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - interna

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: "${SITE_ADDRESS:-:443}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - monitoring
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - interna

networks:
  interna:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
